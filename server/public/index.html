<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Awesome AI Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-panel: #161b22;
            --bg-input: #21262d;
            --primary: #58a6ff;
            --primary-hover: #3182ce;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --msg-user: #21262d;
            --msg-bot: transparent;
            --header-bg: rgba(22, 27, 34, 0.85);
            --input-area-bg: rgba(13, 17, 23, 0.85);
            --gradient-stop: #05080b;
            --bot-pre-bg: rgba(0, 0, 0, 0.4);
            --bot-code-bg: rgba(255, 255, 255, 0.08);
        }

        :root.light-mode {
            --bg-dark: #f6f8fa;
            --bg-panel: #ffffff;
            --bg-input: #ffffff;
            --primary: #0969da;
            --primary-hover: #0349b4;
            --text-main: #24292f;
            --text-muted: #57606a;
            --border: #d0d7de;
            --msg-user: #cce5ff;
            --msg-bot: transparent;
            --header-bg: rgba(255, 255, 255, 0.85);
            --input-area-bg: rgba(246, 248, 250, 0.85);
            --gradient-stop: #e5e8e8;
            --bot-pre-bg: #f6f8fa;
            --bot-code-bg: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark); color: var(--text-main);
            margin: 0; padding: 0; display: flex; height: 100dvh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #layout { display: flex; width: 100%; height: 100dvh; }

        #chat-pane {
            flex: 1; max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column;
            border-right: 1px solid var(--border); background-color: var(--bg-dark);
            transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #chat-pane.split { max-width: 45%; margin: 0; }

        #app-viewer-pane {
            display: none; flex: 1; flex-direction: column; background-color: #ffffff;
            position: relative; border-left: 1px solid var(--border);
        }
        #app-viewer-pane.active {
            display: flex;
        }

        @media (max-width: 768px) {
            #layout { display: flex; flex-direction: column; }
            
            #chat-pane { 
                height: 100dvh; /* dvh fixes issues with mobile browser address bars */
                border-right: none;
            }
            #chat-pane.split { max-width: 100%; }
            
            #app-viewer-pane { 
                height: 100dvh; display: none; width: 100vw; 
                position: fixed; top: 0; left: 0; z-index: 9999;
                border-left: none; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            }
            #app-viewer-pane.active { display: flex; }
            
            .workspace-header { 
                padding: 0 15px; height: 55px; 
            }
            
            #messages { 
                padding: 16px 12px; gap: 16px; 
            }
            
            .message { 
                max-width: 95%; padding: 10px 14px; font-size: 14px; 
            }
            
            .message-row { gap: 10px; }
            .avatar { width: 32px; height: 32px; font-size: 14px; }
            
            #input-area { 
                padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); 
            }
            
            .input-container { 
                padding: 6px 12px; border-radius: 20px; 
            }
            .run-app-btn {
                padding: 12px 20px; font-size: 14px; right: 8px; top: 8px;
                border-radius: 8px; box-shadow: 0 4px 12px rgba(46, 160, 67, 0.4);
            }
            .message.bot pre {
                padding: 16px 12px; margin: 10px 0; border-radius: 8px;
            }
        }

        .workspace-header {
            height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background-color: var(--header-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100;
        }

        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
        .header-title i { color: var(--primary); font-size: 20px; }

        #model-status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .theme-toggle {
            background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;
            font-size: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: color 0.2s, background-color 0.2s;
        }
        .theme-toggle:hover { color: var(--text-main); background-color: var(--bg-input); }
        .model-select {
            background-color: var(--bg-dark);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .model-select:focus { border-color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #ef4444; box-shadow: 0 0 8px #ef4444; transition: background 0.3s; }
        .status-dot.active { background-color: #3fb950; box-shadow: 0 0 8px #3fb950; }

        #messages {
            flex-grow: 1; padding: 30px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--gradient-stop) 100%);
        }

        .message-row { display: flex; gap: 16px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; background-color: var(--bg-input);
        }
        .bot .avatar { color: var(--primary); }
        .user .avatar { color: white; background-color: var(--primary); }

        .message { max-width: 83%; padding: 14px 20px; line-height: 1.6; font-size: 15px; border-radius: 20px; }
        .message.user { 
            background: linear-gradient(135deg, #007aff, #005bb5); color: white; border: none; 
            border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25); 
            line-height: 1.5; font-weight: 400; padding: 12px 18px;
        }
        .message.bot { width: 100%; border: none; padding: 0 16px; font-weight: 300; letter-spacing: 0.2px; }

        .cursor-blink {
            display: inline-block; width: 6px; height: 16px; background-color: var(--text-main);
            animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .message.bot p { margin-top: 0; margin-bottom: 1em; }
        .message.bot p:last-child { margin-bottom: 0; }
        
        .message.bot pre {
            background-color: var(--bot-pre-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin: 14px 0; overflow-x: auto; position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }
        .message.bot code { font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 0.9em; background-color: var(--bot-code-bg); padding: 4px 8px; border-radius: 6px; }
        .message.bot pre code { background-color: transparent; padding: 0; }
        
        .run-app-btn {
            position: absolute; top: 12px; right: 12px; background-color: #238636; color: white;
            border: 1px solid rgba(240, 246, 252, 0.1); padding: 6px 12px; border-radius: 6px; cursor: pointer;
            font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.2s; z-index: 10;
        }
        .run-app-btn:hover { background-color: #2ea043; transform: scale(1.02); }

        #input-area { 
            padding: 20px; background-color: var(--input-area-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100;
        }
        .input-container {
            display: flex; background-color: var(--bg-input); border: 1px solid var(--border);
            border-radius: 24px; padding: 8px 16px; align-items: flex-end; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
        }
        .input-container:focus-within { 
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2), 0 4px 14px rgba(0, 0, 0, 0.4); 
            background-color: var(--bg-panel);
        }
        #message-input {
            flex-grow: 1; padding: 8px 0; background: none; border: none; color: var(--text-main);
            font-size: 15px; outline: none; resize: none; max-height: 200px; line-height: 1.5;
        }
        #message-input::placeholder { color: var(--text-muted); }
        #send-btn {
            background-color: var(--bg-dark); color: var(--text-muted); border: none;
            width: 36px; height: 36px; border-radius: 50%; margin-bottom: 4px; margin-left: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px; flex-shrink: 0;
        }
        #send-btn:not(:disabled) {
            background-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.4);
            transform: translateY(-1px);
        }
        #send-btn:not(:disabled):active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(88, 166, 255, 0.4); }

        .viewer-chrome {
            height: 50px; background-color: #f6f8fa; color: #24292f; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid #d0d7de; font-family: monospace; font-size: 13px; font-weight: bold;
        }
        .viewer-chrome-btn { background: none; border: none; cursor: pointer; color: #57606a; font-size: 16px; padding: 6px; border-radius: 4px;}
        .viewer-chrome-btn:hover { color: #24292f; background: #eaeef2; }
        #app-frame { border: none; width: 100%; flex-grow: 1; background-color: white; }
    </style>
</head>
<body>

<div id="layout">
    <div id="chat-pane">
        <div class="workspace-header">
            <div class="header-title"><i class="fa-solid fa-code"></i> Awesome Studio</div>
            <div id="model-status">
                <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
                <div id="status-indicator" class="status-dot"></div>
                <select id="model-select" class="model-select">
                    <option value="">Detecting...</option>
                </select>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <div class="input-container">
                <textarea id="message-input" placeholder="Type a prompt to code an app..." rows="1"></textarea>
                <button id="send-btn" disabled><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <div id="app-viewer-pane">
        <div class="viewer-chrome">
            <span><i class="fa-solid fa-bolt" style="color: #d29922; margin-right: 8px;"></i> LIVE PREVIEW</span>
            <button class="viewer-chrome-btn" onclick="closeAppViewer()" title="Close Viewer"><i class="fa-solid fa-times"></i></button>
        </div>
        <iframe id="app-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-popups"></iframe>
    </div>
</div>

<script>
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
            return hljs.highlightAuto(code).value;
        },
        breaks: true
    });

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatPane = document.getElementById('chat-pane');
    const viewerPane = document.getElementById('app-viewer-pane');
    const appFrame = document.getElementById('app-frame');

    let chatHistory = [];
    let savedModel = localStorage.getItem("selectedModel");
    let currentTheme = localStorage.getItem("theme") || "dark";

    if (currentTheme === "light") {
        document.documentElement.classList.add("light-mode");
        const icon = document.querySelector(".theme-toggle i");
        if(icon) icon.className = "fa-solid fa-sun";
    }

    function toggleTheme() {
        const root = document.documentElement;
        const icon = document.querySelector('.theme-toggle i');
        root.classList.toggle('light-mode');
        if (root.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
            icon.className = 'fa-solid fa-sun';
        } else {
            localStorage.setItem('theme', 'dark');
            icon.className = 'fa-solid fa-moon';
        }
    }

    messageInput.addEventListener('input', function() {
        this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        if (this.value.trim().length > 0) {
            sendBtn.disabled = false;
        } else {
            sendBtn.disabled = true;
        }
    });

    messageInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    const modelSelect = document.getElementById('model-select');

    modelSelect.addEventListener('change', () => {
        localStorage.setItem("selectedModel", modelSelect.value);
    });

    async function checkModels() {
        try {
            const res = await fetch('/api/models');
            const data = await res.json();
            modelSelect.innerHTML = '';
            
            if (data.models && data.models.length > 0) {
                // Populate options
                data.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    modelSelect.appendChild(opt);
                });
                
                // Select previous or default
                if (savedModel && data.models.some(m => m.name === savedModel)) {
                    modelSelect.value = savedModel;
                } else if (data.models.some(m => m.name.startsWith("gemma"))) {
                    modelSelect.value = data.models.find(m => m.name.startsWith("gemma")).name;
                } else {
                    modelSelect.value = data.models[0].name;
                }
                
                document.getElementById('status-indicator').classList.add('active');
            } else {
                modelSelect.innerHTML = '<option value="">No Models Found</option>';
                document.getElementById('status-indicator').classList.remove('active');
            }
        } catch (err) {
            modelSelect.innerHTML = '<option value="">API Error</option>';
            document.getElementById('status-indicator').classList.remove('active');
        }
    }

    function createMessageContainer(role) {
        const row = document.createElement('div');
        row.className = `message-row ${role}`;
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-code"></i>';
        
        const msg = document.createElement('div');
        msg.className = `message ${role}`;
        
        row.appendChild(avatar);
        row.appendChild(msg);
        messagesDiv.appendChild(row);
        return msg;
    }

    function renderToIframe(code) {
        if (!viewerPane.classList.contains('active')) return;
        
        // Use srcdoc instead of document.write to properly reset document state and prevent script blocking
        // A timeout fixes some rendering bugs where srcdoc behaves asynchronously during frequent updates
        appFrame.srcdoc = code;
    }

    function openAppViewer(code) {
        chatPane.classList.add('split');
        viewerPane.classList.add('active');
        renderToIframe(code);
    }

    function closeAppViewer() {
        chatPane.classList.remove('split');
        viewerPane.classList.remove('active');
        appFrame.src = 'about:blank';
    }

    function parseMarkdownToDOM(msgContainer, markdownContent, isStreaming = false) {
        const rawHtml = marked.parse(markdownContent);
        msgContainer.innerHTML = DOMPurify.sanitize(rawHtml);
        
        if (isStreaming) {
            msgContainer.innerHTML += '<span class="cursor-blink"></span>';
        }

        const blocks = msgContainer.querySelectorAll("pre");
        blocks.forEach(pre => {
            const codeEl = pre.querySelector("code");
            if (codeEl) {
                const isHtml = codeEl.classList.contains("language-html") || markdownContent.includes("<html") || markdownContent.includes("<!DOCTYPE");
                const code = codeEl.textContent;
                
                // Real-time live frame rendering for active streaming
                if (isStreaming && isHtml && code.length > 50) {
                    if (!chatPane.classList.contains('split')) openAppViewer(code);
                    else renderToIframe(code);
                }
                
                // Mount RUN APP button
                if (!isStreaming && isHtml) {
                    if (!pre.querySelector('.run-app-btn')) {
                        const runBtn = document.createElement("button");
                        runBtn.className = "run-app-btn";
                        runBtn.innerHTML = '<i class="fa-solid fa-play"></i> Run App';
                        runBtn.onclick = () => openAppViewer(code);
                        pre.appendChild(runBtn);
                    }
                }
            }
        });
        
        messagesDiv.scrollTo(0, messagesDiv.scrollHeight);
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        messageInput.value = ''; messageInput.style.height = 'auto';
        messageInput.disabled = true; sendBtn.disabled = true;

        const userMsg = createMessageContainer('user');
        userMsg.textContent = text;
        chatHistory.push({ role: 'user', content: text });
        
        const botMsg = createMessageContainer('bot');
        parseMarkdownToDOM(botMsg, "", true);

        try {
            const selectedModel = modelSelect.value;
            if (!selectedModel) {
                botMsg.innerHTML = `<span style="color:red">No model selected!</span>`;
                return;
            }

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: selectedModel, messages: chatHistory })
            });

            if (!res.ok) {
                const errData = await res.json();
                botMsg.innerHTML = `<span style="color:red">API Error: ${errData.error}</span>`;
                return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let botFullContent = "";
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // Keep the last incomplete chunk in the buffer

                for (const line of lines) {
                    if (!line.trim()) continue;
                    try {
                        const data = JSON.parse(line);
                        if (data.message && data.message.content) {
                            botFullContent += data.message.content;
                            parseMarkdownToDOM(botMsg, botFullContent, true);
                        }
                    } catch (e) {
                         console.log("Partial chunk ignored", e);
                    }
                }
            }
            
            // Re-render completely once done
            parseMarkdownToDOM(botMsg, botFullContent, false);
            chatHistory.push({ role: 'assistant', content: botFullContent });
            
            // If the viewer is open, refresh to the final code state to ensure all scripts run
            if (viewerPane.classList.contains('active')) {
                const codeBlocks = botMsg.querySelectorAll("pre code.language-html");
                if (codeBlocks.length > 0) {
                    renderToIframe(codeBlocks[codeBlocks.length - 1].textContent);
                } else if (botFullContent.includes("<html") || botFullContent.includes("<!DOCTYPE")) {
                    const fallbackBlocks = botMsg.querySelectorAll("pre code");
                    for (const fallback of fallbackBlocks) {
                        if (fallback.textContent.includes("<html") || fallback.textContent.includes("<style>")) {
                            renderToIframe(fallback.textContent);
                            break;
                        }
                    }
                }
            }

        } catch (err) {
            botMsg.innerHTML = `<span style="color:red">Failed: ${err.message}</span>`;
        } finally {
            messageInput.disabled = false; sendBtn.disabled = false; messageInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    checkModels();

    const welcomeMsg = createMessageContainer('bot');
    parseMarkdownToDOM(welcomeMsg, "Hello! I am **Awesome Studio**! Ask me to code a component, a game, or an HTML layout. I'll slide open the side-panel and render it live.", false);
</script>
</body>
</html>
