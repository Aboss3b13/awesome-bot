<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Awesome AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #13151b;
            --bg-panel: #1a1d24;
            --bg-input: #1e222b;
            --primary: #f2a65a;
            --primary-hover: #d98e48;
            --text-main: #d1d5db;
            --text-muted: #8b949e;
            --border: #2d3139;
            --msg-user: #1e222b;
            --msg-bot: transparent;
            --header-bg: rgba(19, 21, 27, 0.85);
            --input-area-bg: rgba(19, 21, 27, 0.85);
            --gradient-stop: #0b0c10;
            --bot-pre-bg: #090a0c;
            --bot-code-bg: rgba(255, 255, 255, 0.05);
            --sidebar-bg: #0e1015;
            --sidebar-hover: rgba(255,255,255,0.06);
            --sidebar-active: rgba(242, 166, 90, 0.15);
        }

        :root.light-mode {
            --bg-dark: #f0f2f5;
            --bg-panel: #ffffff;
            --bg-input: #ffffff;
            --primary: #d97706;
            --primary-hover: #b05c04;
            --text-main: #24292f;
            --text-muted: #57606a;
            --border: #d0d7de;
            --msg-user: #e8eaf0;
            --msg-bot: transparent;
            --header-bg: rgba(240, 242, 245, 0.85);
            --input-area-bg: rgba(240, 242, 245, 0.85);
            --gradient-stop: #e5e8e8;
            --bot-pre-bg: #ffffff;
            --bot-code-bg: rgba(0, 0, 0, 0.05);
            --sidebar-bg: #eaeef2;
            --sidebar-hover: rgba(0,0,0,0.05);
            --sidebar-active: rgba(217, 119, 6, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark); color: var(--text-main);
            margin: 0; padding: 0; display: flex; height: 100dvh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #layout { display: flex; width: 100%; height: 100dvh; }

        #sidebar {
            width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto; transition: width 0.3s, opacity 0.3s;
            flex-shrink: 0; z-index: 200;
        }
        #sidebar.hidden { width: 0; opacity: 0; overflow: hidden; border: none; }
        
        .sidebar-header {
            padding: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--sidebar-bg); z-index: 2;
        }
        .new-chat-btn {
            width: 100%; padding: 10px; background: transparent; color: var(--text-main); border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;
            transition: all 0.2s;
        }
        .new-chat-btn:hover { background: var(--sidebar-hover); border-color: var(--text-muted); }
        
        #sessions-list {
            padding: 10px; display: flex; flex-direction: column; gap: 4px;
        }
        .session-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-muted); font-size: 14px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            transition: background 0.2s, color 0.2s;
        }
        .session-title { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
        .session-item:hover { background: var(--sidebar-hover); color: var(--text-main); }
        .session-item.active { background: var(--sidebar-active); color: var(--primary); font-weight: 500; }
        .session-delete-btn { background: transparent; border: none; color: var(--text-muted); padding: 4px; cursor: pointer; display: none; opacity: 0.6; transition: opacity 0.2s, color 0.2s; font-size: 13px; }
        .session-item:hover .session-delete-btn { display: block; }
        .session-delete-btn:hover { opacity: 1; color: #ff5252; }

        #chat-pane {
            flex: 1; max-width: 100%; margin: 0; display: flex; flex-direction: column;
            border-right: 1px solid var(--border); background-color: var(--bg-dark);
            transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #chat-pane.split { max-width: 45%; margin: 0; }

        #app-viewer-pane {
            display: none; flex: 1; flex-direction: column; background-color: #ffffff;
            position: relative; border-left: 1px solid var(--border);
        }
        #app-viewer-pane.active {
            display: flex;
        }

        @media (max-width: 768px) {
            #layout { display: flex; flex-direction: column; width: 100vw; max-width: 100vw; overflow-x: hidden; }
            
            #sidebar {
                position: fixed; left: 0; top: 0; bottom: 0; width: 80vw; max-width: 320px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 1000; transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            #sidebar.hidden { width: 80vw; opacity: 1; transform: translateX(-100%); }

            #chat-pane { 
                height: 100dvh; /* dvh fixes issues with mobile browser address bars */
                border-right: none;
                width: 100vw;
                max-width: 100vw;
            }
            #chat-pane.split { max-width: 100%; }
            
            #app-viewer-pane { 
                height: 100dvh; display: none; width: 100vw; 
                position: fixed; top: 0; left: 0; z-index: 9999;
                border-left: none; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            }
            #app-viewer-pane.active { display: flex; }
            
            .workspace-header { 
                padding: 0 15px; height: 55px; 
            }
            
            #messages { 
                padding: 16px 12px; gap: 16px; 
                width: 100vw; max-width: 100vw; box-sizing: border-box; align-items: stretch;
            }
            
            .message { 
                max-width: 90%; padding: 10px 14px; font-size: 14px; box-sizing: border-box;
            }
            
            .message-row { gap: 10px; width: 100%; box-sizing: border-box; }
            .avatar { width: 32px; height: 32px; font-size: 14px; }
            
            #input-area { 
                padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); 
            }
            
            .input-container { 
                padding: 6px 12px; border-radius: 20px; 
            }
            .run-app-btn, .download-btn {
                padding: 12px 20px; font-size: 14px; right: 8px; top: 8px;
                border-radius: 8px; box-shadow: 0 4px 12px rgba(46, 160, 67, 0.4);
            }
            .download-btn { right: 125px; box-shadow: 0 4px 12px rgba(31, 111, 235, 0.4); }
            .message.bot pre {
                padding: 16px 12px; margin: 10px 0; border-radius: 8px;
            }
        }

        .workspace-header {
            height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background-color: var(--header-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100;
        }

        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
        .header-title i { color: var(--primary); font-size: 20px; }

        #model-status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .theme-toggle {
            background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;
            font-size: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
            transition: color 0.2s, background-color 0.2s;
        }
        .theme-toggle:hover { color: var(--text-main); background-color: var(--bg-input); }
        .model-select {
            background-color: var(--bg-dark);
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .model-select:focus { border-color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #ef4444; box-shadow: 0 0 8px #ef4444; transition: background 0.3s; }
        .status-dot.active { background-color: #3fb950; box-shadow: 0 0 8px #3fb950; }

        #messages {
            flex-grow: 1; padding: 30px; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--gradient-stop) 100%);
            align-items: center;
        }

        .message-row { display: flex; gap: 16px; animation: slideUp 0.3s ease-out; width: 100%; max-width: 900px; min-width: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-row.user { flex-direction: row-reverse; }

        .msg-edit-btn {
            background: var(--bg-input); color: var(--text-muted); border: 1px solid var(--border); 
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            cursor: pointer; opacity: 0; pointer-events: none; visibility: hidden; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s;
            margin: auto 8px auto 0;
            display: flex; align-items: center; justify-content: center;
        }
        .message-row.user:hover .msg-edit-btn { opacity: 1; pointer-events: auto; visibility: visible; }
        .msg-edit-btn:hover { color: var(--primary); border-color: var(--primary); transform: scale(1.1); }

        .avatar {
            width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; background-color: var(--bg-input);
        }
        .bot .avatar { color: var(--primary); }
        .user .avatar { color: white; background-color: var(--primary); }

        .message { 
            max-width: 83%; padding: 14px 20px; line-height: 1.6; font-size: 15px; border-radius: 20px; 
            word-wrap: break-word; overflow-wrap: anywhere; min-width: 0; box-sizing: border-box; /* fixes overflow */
        }
        .message.user { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; border: none; 
            border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(242, 166, 90, 0.25); 
            line-height: 1.5; font-weight: 400; padding: 12px 18px;
        }
        .message.bot { width: 100%; border: none; padding: 0 16px; font-weight: 300; letter-spacing: 0.2px; overflow-x: hidden; }

        .cursor-blink {
            display: inline-block; width: 6px; height: 16px; background-color: var(--text-main);
            animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .message.bot p { margin-top: 0; margin-bottom: 1em; }
        .message.bot p:last-child { margin-bottom: 0; }
        
        .message.bot pre {
            background-color: var(--bot-pre-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin: 14px 0; overflow-x: auto; position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); max-width: 100%;
        }
        .message.bot code { font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 0.9em; background-color: var(--bot-code-bg); padding: 4px 8px; border-radius: 6px; white-space: pre-wrap; word-break: break-word; }
        .message.bot pre code { background-color: transparent; padding: 0; white-space: pre; word-break: normal; }
        
        .run-app-btn, .download-btn {
            position: absolute; top: 12px; right: 12px; background-color: #238636; color: white;
            border: 1px solid rgba(240, 246, 252, 0.1); padding: 6px 12px; border-radius: 6px; cursor: pointer;
            font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.2s; z-index: 10;
        }
        .run-app-btn:hover, .download-btn:hover { background-color: #2ea043; transform: scale(1.02); }
        .download-btn { right: 100px; background-color: #1f6feb; }
        .download-btn:hover { background-color: #388bfd; }

        #input-area { 
            padding: 20px; background-color: var(--input-area-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; display: flex; justify-content: center;
        }
        .input-container {
            display: flex; background-color: var(--bg-input); border: 1px solid var(--border);
            border-radius: 24px; padding: 8px 16px; align-items: flex-end; flex-wrap: wrap; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3); width: 100%; max-width: 900px; position: relative;
        }
        .input-container:focus-within { 
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2), 0 4px 14px rgba(0, 0, 0, 0.4); 
            background-color: var(--bg-panel);
        }
        #message-input {
            flex-grow: 1; padding: 8px 0; background: none; border: none; color: var(--text-main);
            font-size: 15px; outline: none; resize: none; max-height: 200px; line-height: 1.5;
        }
        #message-input::placeholder { color: var(--text-muted); }
        #send-btn {
            background-color: var(--bg-dark); color: var(--text-muted); border: none;
            width: 36px; height: 36px; border-radius: 50%; margin-bottom: 4px; margin-left: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px; flex-shrink: 0;
        }
        #send-btn:not(:disabled) {
            background-color: var(--primary); color: white; box-shadow: 0 4px 12px rgba(242, 166, 90, 0.4);
            transform: translateY(-1px);
        }
        #send-btn:not(:disabled):active { transform: translateY(1px); box-shadow: 0 2px 4px rgba(242, 166, 90, 0.4); }

        .mic-btn {
            background: transparent; color: var(--text-muted); border: none;
            width: 36px; height: 36px; border-radius: 50%; margin-bottom: 4px; margin-left: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color 0.2s, text-shadow 0.2s;
            font-size: 18px; flex-shrink: 0;
        }
        .mic-btn:hover { color: #f85149; }
        .mic-btn.listening { color: #f85149; animation: pulse 1.5s infinite; text-shadow: 0 0 10px rgba(248, 81, 73, 0.6); }
        @keyframes pulse { 0% { transform: scale(0.95); } 50% { transform: scale(1.1); } 100% { transform: scale(0.95); } }

        .file-btn { background: transparent; color: var(--text-muted); border: none; width: 36px; height: 36px; border-radius: 50%; margin-bottom: 4px; margin-left: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color 0.2s; font-size: 18px; flex-shrink: 0; }
        .file-btn:hover { color: var(--text-main); }
        .image-preview { max-height: 200px; max-width: 100%; border-radius: 8px; display: none; object-fit: contain; margin-top: 10px; margin-bottom: 10px; }
        .mermaid { background: white; padding: 10px; border-radius: 8px; margin: 10px 0; max-width: 100%; overflow: auto; }

        .viewer-chrome {
            height: 50px; background-color: #f6f8fa; color: #24292f; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid #d0d7de; font-family: monospace; font-size: 13px; font-weight: bold;
        }
        .viewer-chrome-btn { background: none; border: none; cursor: pointer; color: #57606a; font-size: 16px; padding: 6px; border-radius: 4px;}
        .viewer-chrome-btn:hover { color: #24292f; background: #eaeef2; }
        #app-frame { border: none; width: 100%; flex-grow: 1; background-color: white; }

        /* Mermaid Modal Styles */
        .mermaid-diagram-container { cursor: pointer; transition: transform 0.2s; position: relative; }
        .mermaid-diagram-container:hover { transform: scale(1.02); }
        .mermaid-diagram-container::after { content: '\f0b2 Click to enlarge'; font-family: "FontAwesome"; position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .mermaid-diagram-container:hover::after { opacity: 1; }
        
        .diagram-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .diagram-modal-content { background: white; padding: 20px; border-radius: 12px; max-width: 90vw; max-height: 80vh; overflow: auto; display: flex; justify-content: center; align-items: center; position: relative; }
        .diagram-modal-content svg { width: 100%; height: auto; max-height: 75vh; }
        .diagram-modal-close { position: absolute; top: -40px; right: 0; color: white; font-size: 28px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .diagram-modal-actions { margin-top: 15px; display: flex; gap: 10px; }
        .diagram-modal-btn { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .diagram-modal-btn:hover { background: #2ea043; }
    </style>
</head>
<body>

<div id="layout">
    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="startNewChat()">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
        </div>
        <div id="sessions-list"></div>
    </div>

    <div id="chat-pane">
        <div class="workspace-header">
            <div class="header-title">
                <button id="sidebar-toggle" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:18px; margin-right:8px; padding:4px;">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <i class="fa-solid fa-code"></i> Awesome Studio
            </div>
            <div id="model-status">
                <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
                <div id="status-indicator" class="status-dot"></div>
                <select id="model-select" class="model-select">
                    <option value="">Detecting...</option>
                </select>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <div class="input-container">
                <div id="doc-preview" style="display: none; width: 100%; border-radius: 8px; background: var(--bg-input); padding: 8px 12px; margin-bottom: 10px; border: 1px solid var(--border); font-size: 13px; font-weight: 500; color: var(--text-main); align-items: center; gap: 8px; box-sizing: border-box;">
                    <i class="fa-solid fa-file-alt" style="color: var(--primary);"></i>
                    <span id="doc-filename" style="flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
                    <button onclick="clearAttachedFile()" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <textarea id="message-input" placeholder="Type a prompt or upload a PDF/Word file to analyze..." rows="1"></textarea>
                <label for="file-upload" class="file-btn" title="Upload Image or Document"><i class="fa-solid fa-paperclip"></i></label>
                <input type="file" id="file-upload" style="display: none;" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.md,.json,.js,.html">
                <img id="image-preview" class="image-preview">
                <button id="mic-btn" class="mic-btn" title="Talk to AI"><i class="fa-solid fa-microphone"></i></button>
                <button id="send-btn" disabled><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <div id="app-viewer-pane">
        <div class="viewer-chrome">
            <span><i class="fa-solid fa-bolt" style="color: #d29922; margin-right: 8px;"></i> LIVE PREVIEW</span>
            <button class="viewer-chrome-btn" onclick="closeAppViewer()" title="Close Viewer"><i class="fa-solid fa-times"></i></button>
        </div>
        <iframe id="app-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-popups"></iframe>
    </div>
</div>

<script>
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
            return hljs.highlightAuto(code).value;
        },
        breaks: true
    });

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    
    const fileUpload = document.getElementById('file-upload');
    const imagePreview = document.getElementById('image-preview');
    let currentImageBase64 = null;
    let currentDocumentText = null;
    let currentDocumentName = null;

    function clearAttachedFile(clearInput = true) {
        currentImageBase64 = null;
        currentDocumentText = null;
        currentDocumentName = null;
        const img = document.getElementById('image-preview');
        if (img) img.style.display = 'none';
        const docPrev = document.getElementById('doc-preview');
        if (docPrev) docPrev.style.display = 'none';
        if (fileUpload && clearInput) fileUpload.value = '';
        sendBtn.disabled = !messageInput.value;
    }

    if (fileUpload) {
        fileUpload.addEventListener('change', async function() {
            const file = this.files[0];
            clearAttachedFile(false); // Do not clear the file input yet!
            if (!file) return;

            // Handle images natively
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = e => {
                    currentImageBase64 = e.target.result;
                    if (imagePreview) {
                        imagePreview.src = currentImageBase64;
                        imagePreview.style.display = 'block';
                    }
                    sendBtn.disabled = false;
                };
                reader.readAsDataURL(file);
                return;
            }

            // Handle documents via API
            try {
                const docPrev = document.getElementById('doc-preview');
                const docFname = document.getElementById('doc-filename');
                docPrev.style.display = 'flex';
                docFname.innerHTML = 'Uploading <i class="fa-solid fa-spinner fa-spin"></i>';

                const formData = new FormData();
                formData.append("file", file);

                const response = await fetch("/api/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                if (response.ok) {
                    currentDocumentText = data.text;
                    currentDocumentName = data.filename;
                    docFname.textContent = currentDocumentName;
                    sendBtn.disabled = false;
                } else {
                    alert(data.error);
                    clearAttachedFile();
                }
            } catch (err) {
                console.error(err);
                alert("Upload failed.");
                clearAttachedFile();
            }
        });
    }

    const chatPane = document.getElementById('chat-pane');
    const viewerPane = document.getElementById('app-viewer-pane');
    const appFrame = document.getElementById('app-frame');
    const sidebar = document.getElementById('sidebar');
    const sessionsList = document.getElementById('sessions-list');

    let chatHistory = [];
    let sessions = JSON.parse(localStorage.getItem('awesomeSessions')) || {};
    let currentSessionId = localStorage.getItem('currentSessionId') || createNewSessionId();
    
    // Ensure current session exists
    if (!sessions[currentSessionId]) { currentSessionId = createNewSessionId(); }
    
    let savedModel = localStorage.getItem("selectedModel");
    let currentTheme = localStorage.getItem("theme") || "dark";

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        
        const micBtn = document.getElementById('mic-btn');
        micBtn.onclick = () => {
            if (micBtn.classList.contains('listening')) {
                recognition.stop();
                return;
            }
            recognition.start();
        };
        
        recognition.onstart = () => micBtn.classList.add('listening');
        recognition.onend = () => micBtn.classList.remove('listening');
        recognition.onerror = () => micBtn.classList.remove('listening');
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            messageInput.value = (messageInput.value + ' ' + transcript).trim();
            messageInput.dispatchEvent(new Event('input'));
        };

        document.getElementById('mic-btn').style.display = 'none';

    if (currentTheme === "light") {
        document.documentElement.classList.add("light-mode");

    }

    function toggleTheme() {
        const root = document.documentElement;
        const icon = document.querySelector('.theme-toggle i');
        root.classList.toggle('light-mode');
        if (root.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');

    document.getElementById('sidebar-toggle').addEventListener('click', () => {
        if (window.innerWidth <= 768) {

    function createNewSessionId() {
        const id = 'sess_' + Date.now();
        sessions[id] = { title: "New Chat", history: [] };
        return id;
    }

    function saveSessions() {
        localStorage.setItem('awesomeSessions', JSON.stringify(sessions));
        localStorage.setItem('currentSessionId', currentSessionId);
    }

    function startNewChat() {
        currentSessionId = createNewSessionId();
        chatHistory = sessions[currentSessionId].history;
        saveSessions();
        renderSidebar();
        renderMessages();
        if (window.innerWidth <= 768) sidebar.classList.remove('open');
        messageInput.focus();
    }

    function loadSession(id) {
        if (!sessions[id]) return;
        currentSessionId = id;
        chatHistory = sessions[id].history;
        saveSessions();
        renderSidebar();
        renderMessages();
        if (window.innerWidth <= 768) sidebar.classList.remove('open');
    }

    function renderSidebar() {
        sessionsList.innerHTML = '';
        // Sort sessions by timestamp (descending based on ID)
        const sortedIds = Object.keys(sessions).sort((a,b) => b.localeCompare(a));
        
        for (const id of sortedIds) {
            const sess = sessions[id];
            if (sess.history.length === 0 && id !== currentSessionId && sortedIds.length > 1) continue; // skip empty hidden ones
            
            const btn = document.createElement('div');
            btn.className = `session-item ${id === currentSessionId ? 'active' : ''}`;
            
            const titleSpan = document.createElement('div');
            titleSpan.className = 'session-title';
            titleSpan.innerHTML = `<i class="fa-regular fa-comment-alt"></i> <span>${sess.title || 'New Chat'}</span>`;
            titleSpan.onclick = () => loadSession(id);
            
            const delBtn = document.createElement('button');
            delBtn.className = 'session-delete-btn';
            delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
            delBtn.title = 'Delete Chat';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if (!confirm("Are you sure you want to delete this chat?")) return;
                delete sessions[id];
                const remIds = Object.keys(sessions);
                if (remIds.length === 0) {
                    currentSessionId = createNewSessionId();
                } else if (id === currentSessionId) {
                    currentSessionId = remIds.sort((a,b) => b.localeCompare(a))[0];
                }
                saveSessions();
                loadSession(currentSessionId);
            };
            
            btn.appendChild(titleSpan);
            btn.appendChild(delBtn);
            sessionsList.appendChild(btn);
        }
    }

    function renderMessages() {
        messagesDiv.innerHTML = '';
        if (chatHistory.length === 0) {
            const welcomeMsg = createMessageContainer('bot');
            parseMarkdownToDOM(welcomeMsg, "Hello! I am **Awesome Studio**! Ask me to code a component, a game, or an HTML layout. I'll slide open the side-panel and render it live.", false);
            return;
        }

        for (let i = 0; i < chatHistory.length; i++) {
            const msg = chatHistory[i];
            if (msg.role === 'system') continue;
            
            const container = createMessageContainer(msg.role === 'user' ? 'user' : 'bot');
            if (msg.role === 'user') {
                if (msg.images && msg.images.length > 0) {
                    const imgEl = document.createElement('img');
                    imgEl.src = "data:image/png;base64," + msg.images[0];
                    imgEl.className = 'image-preview';
                    imgEl.style.display = 'block';
                    imgEl.style.maxWidth = '200px';
                    container.appendChild(imgEl);
                }
                if (msg._originalDocName) {
                    const docBadge = document.createElement('div');
                    docBadge.innerHTML = `<i class="fa-solid fa-file-alt"></i> <strong>${msg._originalDocName}</strong>`;
                    docBadge.style.cssText = "background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 8px; display: inline-block;";
                    container.appendChild(docBadge);
                }
                const textDiv = document.createElement('div');
                textDiv.textContent = msg._originalText !== undefined ? msg._originalText : msg.content;
                container.appendChild(textDiv);
                
                const editBtn = document.createElement('button');
                editBtn.className = 'msg-edit-btn';
                editBtn.innerHTML = '<i class="fa-solid fa-pen"></i>';
                editBtn.title = 'Edit Message';
                editBtn.onclick = () => {
                    messageInput.value = msg._originalText !== undefined ? msg._originalText : msg.content;
                    if (msg.images && msg.images.length > 0 && typeof imagePreview !== 'undefined') {
                        currentImageBase64 = "data:image/png;base64," + msg.images[0];
                        imagePreview.src = currentImageBase64;
                        imagePreview.style.display = 'block';
                    }
                    if (msg._originalDocText) {
                        currentDocumentText = msg._originalDocText;
                        currentDocumentName = msg._originalDocName;
                        document.getElementById('doc-preview').style.display = 'flex';
                        document.getElementById('doc-filename').textContent = currentDocumentName;
                    }
                    sessions[currentSessionId].history = sessions[currentSessionId].history.slice(0, i);
                    chatHistory = sessions[currentSessionId].history;
                    saveSessions();
                    renderMessages();
                    sendBtn.disabled = false;
                    messageInput.style.height = 'auto';
                    messageInput.focus();
                };
                container.appendChild(editBtn);
            } else {
                parseMarkdownToDOM(container, msg.content, false);
            }
        }
        messagesDiv.scrollTo(0, messagesDiv.scrollHeight);
    }

    messageInput.addEventListener('input', function() {
        this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        if (this.value.trim().length > 0) {
            sendBtn.disabled = false;
        } else {
            sendBtn.disabled = true;
        }
    });

    messageInput.addEventListener('keydown', function(e) {

    async function checkModels() {
        try {
            const res = await fetch('/api/models');
            const data = await res.json();
            modelSelect.innerHTML = '';
            
            if (data.models && data.models.length > 0) {
                // Populate options
                data.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    modelSelect.appendChild(opt);
                });
                
                // Select previous or default
                if (savedModel && data.models.some(m => m.name === savedModel)) {
                    modelSelect.value = savedModel;
                } else if (data.models.some(m => m.name.startsWith("gemma"))) {
                    modelSelect.value = data.models.find(m => m.name.startsWith("gemma")).name;
                } else {
                    modelSelect.value = data.models[0].name;
                }
                
                document.getElementById('status-indicator').classList.add('active');
            } else {
                modelSelect.innerHTML = '<option value="">No Models Found</option>';

    function renderToIframe(code) {

        // A timeout fixes some rendering bugs where srcdoc behaves asynchronously during frequent updates
        appFrame.srcdoc = code;
    }

    function openAppViewer(code) {
        chatPane.classList.add('split');
        viewerPane.classList.add('active');
        renderToIframe(code);
    }

    function closeAppViewer() {
        chatPane.classList.remove('split');
        viewerPane.classList.remove('active');
        appFrame.src = 'about:blank';

    function parseMarkdownToDOM(msgContainer, markdownContent, isStreaming = false) {
        const rawHtml = marked.parse(markdownContent);
        msgContainer.innerHTML = DOMPurify.sanitize(rawHtml);
        
        if (isStreaming) {
            msgContainer.innerHTML += '<span class="cursor-blink"></span>';
        }

        let hasHtmlApp = false;

        const blocks = msgContainer.querySelectorAll("pre");
        blocks.forEach(pre => {
            const codeEl = pre.querySelector("code");
            if (codeEl) {
                const isHtml = codeEl.classList.contains("language-html") || markdownContent.includes("<html") || markdownContent.includes("<!DOCTYPE");
                const isMermaid = codeEl.classList.contains("language-mermaid");
                const code = codeEl.textContent;
                const isChart = codeEl.classList.contains("language-chartjs") || (codeEl.classList.contains("language-json") && code.includes('"type"'));
                
                if (isMermaid) {
                    const mermaidDiv = document.createElement("div");
                    mermaidDiv.className = "mermaid";
                    mermaidDiv.textContent = code;
                    pre.parentNode.replaceChild(mermaidDiv, pre);
                    return;
                }

                if (isChart) {
                    const wrapper = document.createElement("div");
                    wrapper.className = "mermaid-diagram-container interactive-diagram chart-container";
                    wrapper.style.background = "white";
                    wrapper.style.padding = "10px";
                    wrapper.style.borderRadius = "8px";
                    wrapper.style.margin = "10px 0";
                    pre.parentNode.replaceChild(wrapper, pre);

                    if (isStreaming) {
                        wrapper.innerHTML = "<span style='color: #888;'><i class='fa-solid fa-spinner fa-spin'></i> Rendering Chart...</span>";
                    } else {
                        const canvas = document.createElement("canvas");
                        wrapper.appendChild(canvas);
                        try {
                            const config = JSON.parse(code);
                            // Avoid animation spam on re-renders by disabling initial animation if needed, but Chart.js handles this well enough
                            const chartInstance = new Chart(canvas, config);
                            
                            wrapper.onclick = () => {
                                const modal = document.createElement("div");
                                modal.className = "diagram-modal";
                                
                                const modalContent = document.createElement("div");
                                modalContent.className = "diagram-modal-content";
                                modalContent.style.background = "white";
                                modalContent.style.padding = "20px";
                                modalContent.style.borderRadius = "12px";
                                modalContent.style.width = "80vw"; // Give charts more room
                                
                                const closeBtn = document.createElement("div");
                                closeBtn.className = "diagram-modal-close";
                                closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                                closeBtn.onclick = () => document.body.removeChild(modal);
                                
                                const canvasClone = document.createElement("canvas");
                                canvasClone.style.maxWidth = "100%";
                                canvasClone.style.maxHeight = "70vh";
                                modalContent.appendChild(closeBtn);
                                modalContent.appendChild(canvasClone);
                                
                                // Chart.js needs a beat to measure the modal DOM size
                                setTimeout(() => {
                                    new Chart(canvasClone, config);
                                }, 50);
                                
                                const actions = document.createElement("div");
                                actions.className = "diagram-modal-actions";
                                
                                const downloadPngBtn = document.createElement("button");
                                downloadPngBtn.className = "diagram-modal-btn";
                                downloadPngBtn.innerHTML = '<i class="fa-solid fa-image"></i> PNG Download';
                                downloadPngBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    const a = document.createElement("a");
                                    // Give it a white background instead of transparent
                                    const tmpCanvas = document.createElement('canvas');
                                    tmpCanvas.width = canvasClone.width;
                                    tmpCanvas.height = canvasClone.height;
                                    const ctx = tmpCanvas.getContext('2d');
                                    ctx.fillStyle = 'white';
                                    ctx.fillRect(0, 0, tmpCanvas.width, tmpCanvas.height);
                                    ctx.drawImage(canvasClone, 0, 0);
                                    a.href = tmpCanvas.toDataURL("image/png");
                                    a.download = `chart-${Date.now()}.png`;
                                    a.click();
                                };
                                
                                const downloadJsonBtn = document.createElement("button");
                                downloadJsonBtn.className = "diagram-modal-btn";
                                downloadJsonBtn.innerHTML = '<i class="fa-solid fa-file-code"></i> JSON Config';
                                downloadJsonBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    const blob = new Blob([code], { type: "application/json" });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement("a");
                                    a.href = url;
                                    a.download = `chart-config-${Date.now()}.json`;
                                    a.click();
                                    URL.revokeObjectURL(url);
                                };
                                
                                actions.appendChild(downloadPngBtn);
                                actions.appendChild(downloadJsonBtn);
                                modal.appendChild(modalContent);
                                modal.appendChild(actions);
                                
                                modal.onclick = (e) => {
                                    if (e.target === modal) {
                                        document.body.removeChild(modal);
                                    }
                                };
                                
                                document.body.appendChild(modal);
                            };
                        } catch (err) {
                            wrapper.textContent = "Error parsing chart JSON: " + err.message;
                            wrapper.style.color = "red";
                        }
                    }
                    return;
                }

                // Real-time live frame rendering for active streaming
                if (isStreaming && isHtml && code.length > 50) {
                    if (!chatPane.classList.contains('split')) openAppViewer(code);
                    else renderToIframe(code);
                }
                
                // Mount RUN APP and DOWNLOAD buttons
                if (!isStreaming && isHtml) {
                    hasHtmlApp = true;
                    if (!pre.querySelector('.run-app-btn')) {
                        const runBtn = document.createElement("button");
                        runBtn.className = "run-app-btn";
                        runBtn.innerHTML = '<i class="fa-solid fa-play"></i> Run App';
                        runBtn.onclick = () => openAppViewer(code);
                        pre.appendChild(runBtn);
                        
                        const dlBtn = document.createElement("button");
                        dlBtn.className = "download-btn";
                        dlBtn.innerHTML = '<i class="fa-solid fa-download"></i> Save Code';
                        dlBtn.onclick = () => {
                            const blob = new Blob([code], { type: "text/html" });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `awesome-app-${Date.now()}.html`;
                            a.click();
                            URL.revokeObjectURL(url);
                        };
                        pre.appendChild(dlBtn);
                    }
                }
            }
        });
        
        if (!isStreaming) {
            try {
                if (window.mermaid) {
                    window.mermaid.init(undefined, msgContainer.querySelectorAll('.mermaid'));
                    // Add interactive modal logic and download button directly to the rendered mermaid charts
                    const mermaidDivs = msgContainer.querySelectorAll('.mermaid');
                    mermaidDivs.forEach(mDiv => {
                        const svg = mDiv.querySelector('svg');
                        if (svg && !mDiv.classList.contains('interactive-diagram')) {
                            mDiv.classList.add('interactive-diagram');
                            
                            // Wrap the SVG in a clickable container
                            const wrapper = document.createElement("div");
                            wrapper.className = "mermaid-diagram-container";
                            mDiv.insertBefore(wrapper, svg);
                            wrapper.appendChild(svg);
                            
                            // On click, pop up the modal
                            wrapper.onclick = () => {
                                const modal = document.createElement("div");
                                modal.className = "diagram-modal";
                                
                                const modalContent = document.createElement("div");
                                modalContent.className = "diagram-modal-content";
                                
                                const closeBtn = document.createElement("div");
                                closeBtn.className = "diagram-modal-close";
                                closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                                closeBtn.onclick = () => document.body.removeChild(modal);
                                
                                const svgClone = svg.cloneNode(true);
                                // Ensure SVG scales properly in the modal
                                svgClone.style.maxWidth = "100%";
                                svgClone.style.height = "auto";
                                
                                modalContent.appendChild(closeBtn);
                                modalContent.appendChild(svgClone);
                                
                                const actions = document.createElement("div");
                                actions.className = "diagram-modal-actions";
                                
                                const downloadSvgBtn = document.createElement("button");
                                downloadSvgBtn.className = "diagram-modal-btn";
                                downloadSvgBtn.innerHTML = '<i class="fa-solid fa-file-code"></i> SVG';
                                downloadSvgBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    const svgData = new XMLSerializer().serializeToString(svg);
                                    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
                                    const url = URL.createObjectURL(blob);
                                    const a = document.createElement("a");
                                    a.href = url;
                                    a.download = `diagram-${Date.now()}.svg`;
                                    a.click();
                                    URL.revokeObjectURL(url);
                                };

                                const downloadPngBtn = document.createElement("button");
                                downloadPngBtn.className = "diagram-modal-btn";
                                downloadPngBtn.innerHTML = '<i class="fa-solid fa-image"></i> PNG';
                                downloadPngBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    let svgData = new XMLSerializer().serializeToString(svg);
                                    if (!svgData.includes('xmlns="http://www.w3.org/2000/svg"')) {
                                        svgData = svgData.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
                                    }
                                    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
                                    const url = URL.createObjectURL(blob);
                                    
                                    const img = new Image();
                                    img.onload = () => {
                                        const canvas = document.createElement("canvas");
                                        // 2x scaling for high-res PNG
                                        canvas.width = (img.width || 800) * 2;
                                        canvas.height = (img.height || 600) * 2;
                                        const ctx = canvas.getContext("2d");
                                        ctx.fillStyle = "white"; // White background looks better for docs than transparent
                                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                        
                                        const pngUrl = canvas.toDataURL("image/png");
                                        const a = document.createElement("a");
                                        a.href = pngUrl;
                                        a.download = `diagram-${Date.now()}.png`;
                                        a.click();
                                        URL.revokeObjectURL(url);
                                    };
                                    img.src = url;
                                };
                                
                                actions.appendChild(downloadPngBtn);
                                actions.appendChild(downloadSvgBtn);
                                modal.appendChild(modalContent);
                                modal.appendChild(actions);
                                
                                // Close modal if clicking outside the modal content
                                modal.onclick = (e) => {
                                    if (e.target === modal) {
                                        document.body.removeChild(modal);
                                    }
                                };
                                
                                document.body.appendChild(modal);
                            };
                        }
                    });
                }
            } catch (err) {
                console.error("Mermaid error:", err);
            }
            if (hasHtmlApp && window.confetti) {
                window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            }
        }
        
        messagesDiv.scrollTo(0, messagesDiv.scrollHeight);
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text && !currentImageBase64 && !currentDocumentText) return;

        let finalPayloadText = text;
        let displayNameText = text;

        if (currentDocumentText) {
            finalPayloadText = `[Attached Document: ${currentDocumentName}]\n${currentDocumentText}\n\nUser prompt: ${text}`;
        }

        messageInput.value = ''; messageInput.style.height = 'auto';
        messageInput.disabled = true; sendBtn.disabled = true;

        const userMsg = createMessageContainer('user');
        
        if (currentImageBase64) {
            const imgEl = document.createElement('img');
            imgEl.src = currentImageBase64;
            imgEl.className = 'image-preview';
            imgEl.style.display = 'block';
            imgEl.style.maxWidth = '200px';
            userMsg.appendChild(imgEl);
        }
        
        if (currentDocumentText) {
            const docBadge = document.createElement('div');
            docBadge.innerHTML = `<i class="fa-solid fa-file-alt"></i> <strong>${currentDocumentName}</strong>`;
            docBadge.style.cssText = "background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 8px; display: inline-block;";
            userMsg.appendChild(docBadge);
        }

        const textDiv = document.createElement('div');
        textDiv.textContent = displayNameText;
        userMsg.appendChild(textDiv);
        
        // Final payload to send to Ollama MUST have the text attached. We keep the raw original text locally in another field so we can edit it smoothly later, but default Ollama history format doesn't have custom fields.
        const payloadMsg = { role: 'user', content: finalPayloadText, _originalText: text, _originalDocName: currentDocumentName, _originalDocText: currentDocumentText };
        if (currentImageBase64) {
             payloadMsg.images = [currentImageBase64.split(',')[1]]; // remove data:image/...;base64,
        }
        const userIndex = sessions[currentSessionId].history.length;
        sessions[currentSessionId].history.push(payloadMsg);
        
        const editBtn = document.createElement('button');
        editBtn.className = 'msg-edit-btn';
        editBtn.innerHTML = '<i class="fa-solid fa-pen"></i>';
        editBtn.title = 'Edit Message';
        editBtn.onclick = () => {
            messageInput.value = payloadMsg._originalText !== undefined ? payloadMsg._originalText : payloadMsg.content;
            if (payloadMsg.images && payloadMsg.images.length > 0) {
                currentImageBase64 = "data:image/png;base64," + payloadMsg.images[0];
                imagePreview.src = currentImageBase64;
                imagePreview.style.display = 'block';
            }
            if (payloadMsg._originalDocText) {
                currentDocumentText = payloadMsg._originalDocText;
                currentDocumentName = payloadMsg._originalDocName;
                document.getElementById('doc-preview').style.display = 'flex';
                document.getElementById('doc-filename').textContent = currentDocumentName;
            }
            sessions[currentSessionId].history = sessions[currentSessionId].history.slice(0, userIndex);
            chatHistory = sessions[currentSessionId].history;
            saveSessions();
            renderMessages();
            sendBtn.disabled = false;
            messageInput.style.height = 'auto';
            messageInput.focus();
        };
        userMsg.appendChild(editBtn);
        
        if (imagePreview) {
            imagePreview.style.display = 'none';
            imagePreview.src = '';
            fileUpload.value = '';
            currentImageBase64 = null;
        }
        
        // Auto-title purely on first message
        if (sessions[currentSessionId].history.length === 1 || sessions[currentSessionId].title === "New Chat") {
            const shortTitle = text.split(' ').slice(0, 4).join(' ') + (text.split(' ').length > 4 ? '...' : '');
            sessions[currentSessionId].title = shortTitle || "New Chat";
        }
        
        chatHistory = sessions[currentSessionId].history;
        saveSessions();
        renderSidebar();
        
        const botMsg = createMessageContainer('bot');
        parseMarkdownToDOM(botMsg, "", true);

        try {
            const selectedModel = modelSelect.value;
            if (!selectedModel) {
                botMsg.innerHTML = `<span style="color:red">No model selected!</span>`;
                return;
            }

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: selectedModel, messages: chatHistory })
            });

            if (!res.ok) {
                const errData = await res.json();
                botMsg.innerHTML = `<span style="color:red">API Error: ${errData.error}</span>`;
                return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let botFullContent = "";
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // Keep the last incomplete chunk in the buffer

                for (const line of lines) {
                    if (!line.trim()) continue;
                    try {
                        const data = JSON.parse(line);
                        if (data.message && data.message.content) {
                            botFullContent += data.message.content;
                            parseMarkdownToDOM(botMsg, botFullContent, true);
                        }
                    } catch (e) {
                         console.log("Partial chunk ignored", e);
                    }
                }
            }
            
            // Re-render completely once done
            parseMarkdownToDOM(botMsg, botFullContent, false);
            chatHistory.push({ role: 'assistant', content: botFullContent });
            sessions[currentSessionId].history = chatHistory;
            saveSessions();
            
            // If the viewer is open, refresh to the final code state to ensure all scripts run
            if (viewerPane.classList.contains('active')) {
                const codeBlocks = botMsg.querySelectorAll("pre code.language-html");
                if (codeBlocks.length > 0) {
                    renderToIframe(codeBlocks[codeBlocks.length - 1].textContent);
                } else if (botFullContent.includes("<html") || botFullContent.includes("<!DOCTYPE")) {
                    const fallbackBlocks = botMsg.querySelectorAll("pre code");
                    for (const fallback of fallbackBlocks) {
                        if (fallback.textContent.includes("<html") || fallback.textContent.includes("<style>")) {
                            renderToIframe(fallback.textContent);
                            break;
                        }
                    }
                }
            }

        } catch (err) {
            botMsg.innerHTML = `<span style="color:red">Failed: ${err.message}</span>`;
        } finally {
            messageInput.disabled = false; sendBtn.disabled = false; messageInput.focus();
            saveSessions();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    checkModels();
    
    chatHistory = sessions[currentSessionId].history;
    renderSidebar();
    renderMessages();
</script>
</body>
</html>
